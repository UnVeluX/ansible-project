---
- name: Safely remove Linux user (protected accounts included)
  hosts: all
  become: yes

  vars:
    username: "{{ username }}"

    protected_users:
      - root
      - ansible
      - admin
      - administrator
      - adm
      - sudo
      - wheel
      - ubuntu
      - debian
      - sys
      - system
      - service
      - awx
      - tower
      - git
      - deploy
      - devops
      - ops
      - backup
      - monitoring
      - prometheus
      - grafana
      - nginx
      - apache
      - mysql
      - postgres

  tasks:

    - name: Block protected users
      ansible.builtin.fail:
        msg: "REFUSED: {{ username }} is maybe a protected system/admin account"
      when: username in protected_users

    - name: Check user exists
      ansible.builtin.getent:
        database: passwd
        key: "{{ username }}"
      register: user_check
      ignore_errors: yes

    - name: Delete user
      ansible.builtin.user:
        name: "{{ username }}"
        state: absent
        remove: yes
      when: user_check is succeeded
