---
- name: Full system report (CPU, RAM, Disk, OS, IP)
  hosts: all
  gather_facts: yes

  tasks:

    - name: Get CPU usage
      ansible.builtin.shell: "top -bn1 | grep 'Cpu(s)' | awk '{print $2 + $4}'"
      register: cpu_usage

    - name: Display system report
      ansible.builtin.debug:
        msg: |
          ============================================
          HOSTNAME: {{ ansible_hostname }}
          ============================================

          OS INFORMATION:
          - Distribution: {{ ansible_distribution }}
          - Version: {{ ansible_distribution_version }}
          - Kernel: {{ ansible_kernel }}

          NETWORK:
          - IP Address: {{ ansible_default_ipv4.address | default('N/A') }}

          CPU:
          - Model: {{ ansible_processor[2] | default(ansible_processor[0]) }}
          - vCPUs: {{ ansible_processor_vcpus }}
          - Usage: {{ cpu_usage.stdout }} %

          MEMORY:
          - Total: {{ ansible_memtotal_mb }} MB
          - Free: {{ ansible_memfree_mb }} MB

          DISK:
          {% for item in ansible_mounts %}
          - Mount: {{ item.mount }}
            Total: {{ (item.size_total / 1024**3) | round(2) }} GB
            Free:  {{ (item.size_available / 1024**3) | round(2) }} GB
          {% endfor %}
